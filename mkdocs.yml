site_name: CopilotBuddy Documentation
site_description: WoW Bot Framework for WotLK 3.3.5a
site_author: CopilotBuddy Team
repo_url: https://github.com/yourusername/CopilotBuddy
repo_name: CopilotBuddy

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - awesome-pages

nav:
  - Home: index.md
  - API Reference:
      - Overview: api/overview.md
      - Core Systems:
          - Memory: api/core/memory.md
      - Styx.WoWInternals:
          - ObjectManager: api/styx/objectmanager.md
          - Lua: api/styx/lua.md
      - WoW Objects:
          - WoWObject: api/wowobjects/wowobject.md
          - WoWUnit: api/wowobjects/wowunit.md
          - WoWPlayer: api/wowobjects/wowplayer.md
          - LocalPlayer: api/wowobjects/localplayer.md
          - WoWItem: api/wowobjects/wowitem.md
          - WoWGameObject: api/wowobjects/wowgameobject.md
      - Combat:
          - CustomClass: api/combat/customclass.md
          - SpellManager: api/combat/spellmanager.md
          - WoWSpell: api/combat/wowspell.md
          - WoWAura: api/combat/wowaura.md
      - Pathing:
          - Navigator: api/pathing/navigator.md
      - Movement:
          - WoWMovement: api/movement/wowmovement.md
      - Logic:
          - Blacklist: api/logic/blacklist.md
          - Targeting: api/logic/targeting.md
          - BotPoi (POI): api/logic/botpoi.md
      - Inventory:
          - WoWBag: api/inventory/wowbag.md
      - TreeSharp:
          - Overview: api/treesharp/overview.md
  - WotLK Compatibility:
      - Overview: compatibility/overview.md
      - API Differences: compatibility/api-differences.md
  - About:
      - Setup Guide: SETUP.md
