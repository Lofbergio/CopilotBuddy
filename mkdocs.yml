site_name: CopilotBuddy Documentation
site_description: WoW Bot Framework for WotLK 3.3.5a
site_author: CopilotBuddy Team
repo_url: https://github.com/yourusername/CopilotBuddy
repo_name: CopilotBuddy

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - awesome-pages

nav:
  - Home: index.md
  - API Reference:
      - Public API (Auto): api/auto/README.md
      - Overview Outils: api/public_api_index.md
  - Guides:
      - Création de routines: guides/creating-routines.md
      - Lecture mémoire: guides/memory-reading.md
  - Outils:
      - Générateur de profils: profile-generator.md
  - À propos:
      - Guide d'installation: SETUP.md
      - Changelog: about/changelog.md
